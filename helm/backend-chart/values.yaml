replicaCount: 2
image:
  repository: MY_AWS_ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/backend
  tag: "latest"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 5000

env:
  flaskEnv: "production"
  databaseUrl: "postgresql://myuser:mypassword@database-service:5432/mydb"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
