name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push Backend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Build, tag, and push Frontend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: frontend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./frontend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Update Kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Create Secrets
        run: |
          kubectl create namespace production || true
          kubectl apply -f k8s/secret.yaml -n production

      - name: Deploy Backend using Helm
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          helm upgrade --install backend-app ./helm/backend-chart \
            --set image.repository=$ECR_REGISTRY/backend \
            --set image.tag=$IMAGE_TAG \
            --namespace production \
            --create-namespace

      - name: Deploy Frontend using Helm
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          helm upgrade --install frontend-app ./helm/frontend-chart \
            --set image.repository=$ECR_REGISTRY/frontend \
            --set image.tag=$IMAGE_TAG \
            --namespace production \
            --create-namespace

      - name: Verify Deployments
        run: |
          kubectl rollout status deployment/backend-app -n production --timeout=300s
          kubectl rollout status deployment/frontend-app -n production --timeout=300s

      - name: Debug Deployment Issues
        if: failure()
        run: |
          echo "==== POD STATUS ===="
          kubectl get pods -n production
          echo "==== POD DESCRIPTIONS ===="
          kubectl describe pods -l app=backend -n production
          echo "==== POD LOGS ===="
          kubectl logs -l app=backend -n production --all-containers=true || true
